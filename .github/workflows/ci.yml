name: CI

# Build and test the Go binaries on every push / PR.
# Fyne links CGO (OpenGL/Cocoa), so each OS must build on its own native
# runner — there is no reliable cross-compile. gcc ships on windows-latest
# and clang ships on the macOS runners, so no extra toolchain step is needed.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, macos-latest ]
    env:
      CGO_ENABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Build all packages
        run: go build ./...

      - name: Test
        run: go test ./...
