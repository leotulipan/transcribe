[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
markers =
    integration: marks tests as integration tests (require API keys)
    slow: marks tests as slow (may call real APIs)
    unit: marks tests as unit tests (fast, no external calls)
asyncio_mode = auto
